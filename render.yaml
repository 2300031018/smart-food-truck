services:
  # Backend Service
  - type: web
    name: smart-food-truck-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_WHITELIST
        sync: false

  # Frontend Service (Static Site)
  - type: static
    name: smart-food-truck-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-food-truck-backend
          property: url
      - key: NODE_VERSION
        value: 20.12.2
