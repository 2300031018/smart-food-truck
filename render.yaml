services:
  - type: web
    name: smart-food-truck-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_WHITELIST
        sync: false

  - type: static
    name: smart-food-truck-frontend
    rootDir: frontend
    buildCommand: npm install && npx vite build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
