services:
  # Backend Service
  - type: web
    name: smart-food-truck-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_WHITELIST
        sync: false

  # Frontend Service (served as Web Service to avoid type issues)
  - type: web
    name: smart-food-truck-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        sync: false
